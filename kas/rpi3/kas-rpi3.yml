header:
  version: 14
  includes:
   - kas-rpi3-lock.yml

distro: product
target: product-test0
machine: raspberrypi3-64

repos:
  poky:
    path: poky
    url: https://github.com/bf109up-dev/poky.git
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    path: meta-openembedded
    url: https://github.com/bf109up-dev/meta-openembedded.git
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:
      meta-networking:
      meta-filesystems:
      meta-perl:
      meta-webserver:

  meta-rauc:
    url: https://github.com/bf109up-dev/meta-rauc.git
    branch: scarthgap
    path: meta-rauc

  meta-product:
    url: https://github.com/bf109up-dev/meta-product.git
    branch: scarthgap
    path: meta-product
  
  meta-raspberrypi:
    url: https://github.com/bf109up-dev/meta-raspberrypi.git
    branch: scarthgap    
    path: meta-raspberrypi

  meta-rpi3:
    url: https://github.com/bf109up-dev/meta-rpi3.git
    branch: scarthgap    
    path: meta-rpi3

local_conf_header:
  cpu_limits: |
    BB_NUMBER_THREADS = "10"
    PARALLEL_MAKE = "-j 10"
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

    # RPI용 커널 제공자 설정 (기존 linux-cip-rt에서 변경)
    PREFERRED_PROVIDER_virtual/kernel = "linux-raspberrypi"
    # Select specific version of rauc-conf to resolve layer conflict
    BBMASK += "meta-rauc/recipes-core/rauc/rauc-conf.bb"
  
  rpi3_mirror: |
    # Enable own-mirrors class to use the local download mirror
    INHERIT += "own-mirrors"
    # Set the local path for downloaded source tarballs
    SOURCE_MIRROR_URL = "file:///home/yang/work/yocto/mirror/github/manifest/r202604051543/downloads"
    # Set the local path for the sstate cache mirror
    SSTATE_MIRRORS ?= "file://.* file:///home/yang/work/yocto/mirror/github/manifest/r202604051543/sstate-cache/PATH"
  
  rpi3_output: |
    # rpi3 전용 빌드 및 미러 경로 설정 (scarthgap/output/rpi3 하위)
    TMPDIR = "${TOPDIR}/tmp"
    DL_DIR = "${TOPDIR}/../../../output/rpi3/mirror/downloads"
    SSTATE_DIR = "${TOPDIR}/../../../output/rpi3/mirror/sstate-cache"
    BB_GENERATE_MIRROR_TARBALLS = "1"
    IMAGE_FSTYPES:append = " tar.bz2"

  rpi3_samples: |
    # Hello Mod (Kernel Module) and Hello App (User Space) 추가
    IMAGE_INSTALL:append = " hello-mod hello"
