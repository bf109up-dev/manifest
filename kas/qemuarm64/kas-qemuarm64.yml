header:
  version: 14
  includes:
   - kas-qemuarm64-lock.yml


distro: product
target: product-test0
machine: qemuarm64

repos:
  poky:
    path: poky
    url: https://github.com/bf109up-dev/poky.git
    branch: scarthgap
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    path: meta-openembedded
    url: https://github.com/bf109up-dev/meta-openembedded.git
    branch: scarthgap
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:
      meta-networking:
      meta-filesystems:
      meta-perl:
      meta-webserver:

  meta-rauc:
    url: https://github.com/bf109up-dev/meta-rauc.git
    branch: scarthgap
    path: meta-rauc

  meta-product:
    url: https://github.com/bf109up-dev/meta-product.git
    branch: scarthgap
    path: meta-product
  
  meta-qemuarm64:
    path: meta-qemuarm64


local_conf_header:
  cpu_limits: |
    BB_NUMBER_THREADS = "10"
    PARALLEL_MAKE = "-j 10"
    LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"
    # QEMU 가상머신 부팅을 위한 메타데이터 파일 생성 옵션 활성화
    IMAGE_CLASSES += "qemuboot"

    # CIP Real-Time 6.12.57 커널 제공자 설정
    PREFERRED_PROVIDER_virtual/kernel = "linux-cip-rt"
    # Select specific version of rauc-conf to resolve layer conflict
    BBMASK += "meta-rauc/recipes-core/rauc/rauc-conf.bb"
  
  qemuarm64_mirror: |
    # Enable own-mirrors class to use the local download mirror
    INHERIT += "own-mirrors"
    # Set the local path for downloaded source tarballs
    SOURCE_MIRROR_URL = "file:///home/yang/work/yocto/mirror/github/manifest/5146dd2c/downloads"
    # Set the local path for the sstate cache mirror
    SSTATE_MIRRORS ?= "file://.* file:///home/yang/work/yocto/mirror/github/manifest/5146dd2c/sstate-cache/PATH"
  
  qemuarm64_output: |
    # DNS/네트워크 지연 대응을 위한 wget 재시도 보강
    FETCHCMD_wget:append = " -t 10 -T 30"
    # qemuarm64 전용 빌드 및 미러 경로 설정 (scarthgap/output/qemuarm64 하위)
    TMPDIR = "${TOPDIR}/tmp"
    DL_DIR = "${TOPDIR}/../../../output/qemuarm64/mirror/downloads"
    SSTATE_DIR = "${TOPDIR}/../../../output/qemuarm64/mirror/sstate-cache"
    BB_GENERATE_MIRROR_TARBALLS = "1"
    IMAGE_FSTYPES:append = " tar.bz2"

  qemuarm64_samples: |
    # Hello Mod (Kernel Module) and Hello App (User Space) 추가
    IMAGE_INSTALL:append = " hello-mod hello"
